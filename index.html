<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Card Generator - IG Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+Mono:wght@500&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-color: #545c2a; --text-color: #ffffff; }
        body { font-family: -apple-system, sans-serif; display: flex; background: #f0f0f0; margin: 0; height: 100vh; overflow: hidden; }
        #controls { width: 350px; padding: 20px; background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        textarea { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 13px; font-weight: bold; color: #666; display: flex; justify-content: space-between; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #fff; font-size: 13px; }
        .btn-page { background: #e0e0e0; color: #333; margin: 0 5px 5px 0; }
        #preview-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; background: #e8e8e8; }
        #canvas-container { width: 500px; height: 500px; background: var(--bg-color); display: flex; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #text-box { color: var(--text-color); writing-mode: vertical-rl; display: flex; white-space: pre-wrap; width: 85%; height: 85%; margin: auto; transition: transform 0.1s; }
        #stats-board { position: absolute; bottom: 15px; right: 15px; background: rgba(255,255,255,0.8); padding: 8px; border-radius: 5px; font-size: 10px; line-height: 1.4; pointer-events: none; }
    </style>
</head>
<body>

<div id="controls">
    <h2>Poetry Config</h2>
    
    <div class="control-group">
        <label>內容輸入 <span>( --- 分頁)</span></label>
        <textarea id="textInput">鏽色&#10;&#10;我終究還是長大了&#10;無視你的意願</textarea>
        <button class="btn" onclick="insertPageBreak()">插入分頁符號 ---</button>
    </div>

    <div class="control-group">
        <label>底色與字體</label>
        <input type="color" id="bgColor" value="#545c2a">
        <select id="fontSelect">
            <option value="'Noto Serif TC', serif">文青宋體</option>
            <option value="'Noto Sans Mono', monospace">科技黑體</option>
            <option value="'ZCOOL KuaiLe', cursive">可愛圓潤</option>
        </select>
    </div>

    <div class="control-group">
        <label>
            字級縮放 
            <span><input type="checkbox" id="autoScale" checked> 自動填滿</span>
        </label>
        <input type="range" id="fontSizeSlider" min="10" max="250" value="50">
    </div>

    <div class="control-group">
        <label>行距 (Line Spacing)</label>
        <input type="range" id="lineHeightSlider" min="1" max="3" step="0.1" value="1.5">
    </div>

    <div class="control-group">
        <label>對齊與位移</label>
        <select id="alignSelect">
            <option value="center">居中</option>
            <option value="flex-start">靠上</option>
            <option value="flex-end">靠下</option>
        </select>
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><small>X 偏移</small><input type="range" id="offsetX" min="-200" max="200" value="0" style="width:100%"></div>
            <div style="flex:1"><small>Y 偏移</small><input type="range" id="offsetY" min="-200" max="200" value="0" style="width:100%"></div>
        </div>
    </div>

    <hr>
    <div id="pagination-controls"></div>
    <button class="btn" style="background:#2a5c3a" onclick="downloadImage()">下載當前 PNG</button>
</div>

<div id="preview-area">
    <div id="canvas-container">
        <div id="text-box"></div>
        <div id="stats-board">
            <b>METRICS</b><br>
            Size: <span id="val-size">0</span>px<br>
            Lines: <span id="val-lines">0</span><br>
            Page: <span id="val-page">1/1</span>
        </div>
    </div>
</div>

<script>
    const el = {
        input: document.getElementById('textInput'),
        box: document.getElementById('text-box'),
        canvas: document.getElementById('canvas-container'),
        font: document.getElementById('fontSelect'),
        bg: document.getElementById('bgColor'),
        auto: document.getElementById('autoScale'),
        size: document.getElementById('fontSizeSlider'),
        line: document.getElementById('lineHeightSlider'),
        align: document.getElementById('alignSelect'),
        offX: document.getElementById('offsetX'),
        offY: document.getElementById('offsetY'),
        pages: document.getElementById('pagination-controls')
    };

    let currentPage = 0;
    let pageData = [];

    function render() {
        pageData = el.input.value.split(/\n---\n|---/);
        if (currentPage >= pageData.length) currentPage = pageData.length - 1;

        el.canvas.style.backgroundColor = el.bg.value;
        el.box.style.fontFamily = el.font.value;
        el.box.style.justifyContent = el.align.value;
        el.box.style.lineHeight = el.line.value;
        el.box.style.transform = `translate(${el.offX.value}px, ${el.offY.value}px)`;
        
        const content = (pageData[currentPage] || "").trim();
        el.box.innerText = content;

        if (el.auto.checked) {
            el.size.disabled = true;
            autoScale();
        } else {
            el.size.disabled = false;
            el.box.style.fontSize = el.size.value + 'px';
            document.getElementById('val-size').innerText = el.size.value;
        }

        updatePagination();
        document.getElementById('val-lines').innerText = content.split('\n').length;
        document.getElementById('val-page').innerText = `${currentPage + 1} / ${pageData.length}`;
    }

    function autoScale() {
        let s = 200;
        const maxW = el.canvas.clientWidth * 0.85;
        const maxH = el.canvas.clientHeight * 0.85;
        el.box.style.fontSize = s + 'px';
        while ((el.box.scrollHeight > maxH || el.box.scrollWidth > maxW) && s > 10) {
            s -= 1;
            el.box.style.fontSize = s + 'px';
        }
        document.getElementById('val-size').innerText = s;
        el.size.value = s;
    }

    function updatePagination() {
        el.pages.innerHTML = '<label>切換頁面</label>';
        pageData.forEach((_, i) => {
            const b = document.createElement('button');
            b.innerText = i + 1;
            b.className = 'btn btn-page';
            if (i === currentPage) b.style.background = '#333', b.style.color = '#fff';
            b.onclick = () => { currentPage = i; render(); };
            el.pages.appendChild(b);
        });
    }

    function insertPageBreak() {
        const cur = el.input.selectionStart;
        el.input.value = el.input.value.slice(0, cur) + "\n---\n" + el.input.value.slice(cur);
        render();
    }

    async function downloadImage() {
        const canvas = await html2canvas(el.canvas, { scale: 2 }); // 2倍清析度
        const link = document.createElement('a');
        link.download = `poem-${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    [el.input, el.bg, el.font, el.auto, el.size, el.line, el.align, el.offX, el.offY].forEach(item => {
        item.addEventListener('input', render);
    });

    render();
</script>
</body>
</html>
