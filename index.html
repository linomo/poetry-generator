<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Card - Per-Page Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+Mono:wght@500&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-color: #545c2a; }
        body { font-family: -apple-system, sans-serif; display: flex; background: #f0f0f0; margin: 0; height: 100vh; overflow: hidden; }
        #controls { width: 280px; padding: 15px; background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        h2 { margin: 0; font-size: 1.1rem; border-bottom: 2px solid #333; padding-bottom: 5px; }
        textarea { width: 100%; height: 100px; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; resize: none; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 11px; font-weight: bold; color: #666; display: flex; justify-content: space-between; }
        .btn { padding: 8px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #fff; font-size: 12px; font-weight: bold; }
        .btn-page { background: #eee; color: #333; margin: 0 4px 4px 0; min-width: 32px; border: 1px solid #ddd; }
        #preview-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #dbdbdb; }
        #canvas-container { 
            width: 500px; height: 500px; background: var(--bg-color); 
            display: flex; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            align-items: center; justify-content: center; 
        }
        #text-box { 
            color: #fff; writing-mode: vertical-rl; display: flex; white-space: pre-wrap; 
            max-width: 90%; max-height: 90%; line-height: 1.5; 
        }
        #stats-board { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; padding: 5px 8px; border-radius: 3px; font-size: 9px; pointer-events: none; }
    </style>
</head>
<body>

<div id="controls">
    <h2>Poetry Station</h2>
    <div class="control-group">
        <label>內文 <span>(--- 分頁)</span></label>
        <textarea id="textInput">第一頁&#10;---&#10;第二頁字比較多&#10;需要獨立縮放</textarea>
        <button class="btn" onclick="insertPageBreak()" style="background:#888">插入分頁</button>
    </div>

    <div class="control-group">
        <label>全體底色</label>
        <input type="color" id="bgColor" value="#545c2a">
    </div>

    <div class="control-group">
        <label>
            當前頁面字級 
            <span><input type="checkbox" id="autoScale"> 自動</span>
        </label>
        <input type="range" id="fontSizeSlider" min="10" max="250" value="60">
    </div>

    <div class="control-group">
        <label>字體風格 (全體)</label>
        <select id="fontSelect">
            <option value="'Noto Serif TC', serif">文青宋體</option>
            <option value="'Noto Sans Mono', monospace">科技黑體</option>
            <option value="'ZCOOL KuaiLe', cursive">可愛圓體</option>
        </select>
    </div>

    <div class="control-group">
        <label>對齊方式 (當前頁)</label>
        <select id="alignX">
            <option value="center">X 置中</option>
            <option value="flex-start">X 置右</option>
            <option value="flex-end">X 置左</option>
        </select>
        <select id="alignY" style="margin-top:4px">
            <option value="center">Y 置中</option>
            <option value="flex-start">Y 靠上</option>
            <option value="flex-end">Y 靠下</option>
        </select>
    </div>

    <div class="control-group">
        <label>座標微調 (當前頁)</label>
        <div style="display:flex; gap:5px;">
            <input type="range" id="offsetX" min="-200" max="200" value="0">
            <input type="range" id="offsetY" min="-200" max="200" value="0">
        </div>
    </div>

    <hr>
    <div id="pagination-controls"></div>
    <button class="btn" style="background:#2a5c3a" onclick="downloadImage()">下載本頁 PNG</button>
</div>

<div id="preview-area">
    <div id="canvas-container">
        <div id="text-box"></div>
        <div id="stats-board">
            PAGE: <span id="val-page">1/1</span> | SIZE: <span id="val-size">0</span>px
        </div>
    </div>
</div>

<script>
    const el = {
        input: document.getElementById('textInput'),
        box: document.getElementById('text-box'),
        container: document.getElementById('canvas-container'),
        bg: document.getElementById('bgColor'),
        font: document.getElementById('fontSelect'),
        auto: document.getElementById('autoScale'),
        size: document.getElementById('fontSizeSlider'),
        alignX: document.getElementById('alignX'),
        alignY: document.getElementById('alignY'),
        offX: document.getElementById('offsetX'),
        offY: document.getElementById('offsetY'),
        pages: document.getElementById('pagination-controls')
    };

    let currentPage = 0;
    let pageConfigs = []; // 儲存每一頁的獨立設定

    function updatePageData() {
        const texts = el.input.value.split(/\n---\n|---/);
        
        // 同步配置陣列長度
        texts.forEach((txt, i) => {
            if (!pageConfigs[i]) {
                // 如果是新頁面，繼承前一頁的設定或使用預設值
                const prev = pageConfigs[i-1] || {};
                pageConfigs[i] = {
                    text: txt.trim(),
                    fontSize: prev.fontSize || 60,
                    auto: prev.auto !== undefined ? prev.auto : true,
                    alignX: prev.alignX || 'center',
                    alignY: prev.alignY || 'center',
                    offX: prev.offX || 0,
                    offY: prev.offY || 0
                };
            } else {
                pageConfigs[i].text = txt.trim();
            }
        });
        
        // 刪除多餘的配置
        if (pageConfigs.length > texts.length) {
            pageConfigs = pageConfigs.slice(0, texts.length);
        }
        
        syncUI();
    }

    // 將當前頁面的數據反應到控制面板上
    function syncUI() {
        const conf = pageConfigs[currentPage];
        if (!conf) return;

        el.auto.checked = conf.auto;
        el.size.value = conf.fontSize;
        el.size.disabled = conf.auto;
        el.alignX.value = conf.alignX;
        el.alignY.value = conf.alignY;
        el.offX.value = conf.offX;
        el.offY.value = conf.offY;
        
        render();
    }

    function render() {
        const conf = pageConfigs[currentPage];
        el.container.style.backgroundColor = el.bg.value;
        el.box.style.fontFamily = el.font.value;
        el.container.style.alignItems = conf.alignX;
        el.container.style.justifyContent = conf.alignY;
        el.box.style.transform = `translate(${conf.offX}px, ${conf.offY}px)`;
        el.box.innerText = conf.text;

        if (conf.auto) {
            autoScale();
        } else {
            el.box.style.fontSize = conf.fontSize + 'px';
            document.getElementById('val-size').innerText = conf.fontSize;
        }

        updatePagination();
        document.getElementById('val-page').innerText = `${currentPage + 1}/${pageConfigs.length}`;
    }

    function autoScale() {
        let s = 220;
        const limitW = el.container.clientWidth * 0.88;
        const limitH = el.container.clientHeight * 0.88;
        el.box.style.fontSize = s + 'px';
        while ((el.box.offsetHeight > limitH || el.box.offsetWidth > limitW) && s > 12) {
            s -= 1;
            el.box.style.fontSize = s + 'px';
        }
        pageConfigs[currentPage].fontSize = s; // 更新記憶
        document.getElementById('val-size').innerText = s;
    }

    // 監聽控制項：當使用者撥動滑桿時，只更新「當前頁面」的記憶
    function handleControlInput(key, value) {
        if (pageConfigs[currentPage]) {
            pageConfigs[currentPage][key] = value;
            render();
        }
    }

    function updatePagination() {
        el.pages.innerHTML = '<label>切換頁面</label>';
        pageConfigs.forEach((_, i) => {
            const b = document.createElement('button');
            b.innerText = i + 1;
            b.className = 'btn btn-page';
            if (i === currentPage) { b.style.background = '#333'; b.style.color = '#fff'; }
            b.onclick = () => { currentPage = i; syncUI(); };
            el.pages.appendChild(b);
        });
    }

    function insertPageBreak() {
        const pos = el.input.selectionStart;
        el.input.value = el.input.value.slice(0, pos) + "\n---\n" + el.input.value.slice(pos);
        updatePageData();
    }

    async function downloadImage() {
        document.getElementById('stats-board').style.opacity = '0';
        const canvas = await html2canvas(el.container, { scale: 2 });
        document.getElementById('stats-board').style.opacity = '1';
        const link = document.createElement('a');
        link.download = `poem-p${currentPage+1}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    // 事件綁定
    el.input.addEventListener('input', updatePageData);
    el.bg.addEventListener('input', render);
    el.font.addEventListener('change', render);

    el.auto.addEventListener('change', (e) => handleControlInput('auto', e.target.checked));
    el.size.addEventListener('input', (e) => handleControlInput('fontSize', parseInt(e.target.value)));
    el.alignX.addEventListener('change', (e) => handleControlInput('alignX', e.target.value));
    el.alignY.addEventListener('change', (e) => handleControlInput('alignY', e.target.value));
    el.offX.addEventListener('input', (e) => handleControlInput('offX', parseInt(e.target.value)));
    el.offY.addEventListener('input', (e) => handleControlInput('offY', parseInt(e.target.value)));

    // 啟動
    updatePageData();
</script>
</body>
</html>
